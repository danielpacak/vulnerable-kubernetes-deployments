---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "mobile-bff-deployment"
  labels:
    app.kubernetes.io/name: "eshop-apphost"
    app.kubernetes.io/component: "mobile-bff"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "eshop-apphost"
        app.kubernetes.io/component: "mobile-bff"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - command:
            - "dotnet"
          image: "mcr.microsoft.com/dotnet/nightly/yarp:2.3-preview"
          name: "mobile-bff"
          envFrom:
            - configMapRef:
                name: "mobile-bff-config"
          args:
            - "/app/yarp.dll"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: 5000
          imagePullPolicy: "IfNotPresent"
  selector:
    matchLabels:
      app.kubernetes.io/name: "eshop-apphost"
      app.kubernetes.io/component: "mobile-bff"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
