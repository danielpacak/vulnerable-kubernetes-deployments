---
apiVersion: "v1"
kind: "ConfigMap"
metadata:
  name: "catalog-api-config"
  labels:
    app.kubernetes.io/name: "eshop-apphost"
    app.kubernetes.io/component: "catalog-api"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
data:
  OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "{{ .Values.config.catalog_api.OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY }}"
  ASPNETCORE_FORWARDEDHEADERS_ENABLED: "{{ .Values.config.catalog_api.ASPNETCORE_FORWARDEDHEADERS_ENABLED }}"
  HTTP_PORTS: "{{ .Values.parameters.catalog_api.port_http }}"
  EVENTBUS_HOST: "{{ .Values.config.catalog_api.EVENTBUS_HOST }}"
  EVENTBUS_PORT: "{{ .Values.config.catalog_api.EVENTBUS_PORT }}"
  EVENTBUS_USERNAME: "{{ .Values.config.catalog_api.EVENTBUS_USERNAME }}"
  CATALOGDB_HOST: "{{ .Values.config.catalog_api.CATALOGDB_HOST }}"
  CATALOGDB_PORT: "{{ .Values.config.catalog_api.CATALOGDB_PORT }}"
  CATALOGDB_USERNAME: "{{ .Values.config.catalog_api.CATALOGDB_USERNAME }}"
  CATALOGDB_JDBCCONNECTIONSTRING: "{{ .Values.config.catalog_api.CATALOGDB_JDBCCONNECTIONSTRING }}"
  CATALOGDB_DATABASENAME: "{{ .Values.config.catalog_api.CATALOGDB_DATABASENAME }}"
