---
apiVersion: "v1"
kind: "Secret"
metadata:
  name: "payment-processor-secrets"
  labels:
    app.kubernetes.io/name: "eshop-apphost"
    app.kubernetes.io/component: "payment-processor"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
stringData:
  ConnectionStrings__eventbus: "amqp://guest:{{ .Values.secrets.payment_processor.eventbus_password }}@eventbus-service:5672"
  EVENTBUS_PASSWORD: "{{ .Values.secrets.payment_processor.eventbus_password }}"
  EVENTBUS_URI: "amqp://guest:{{ .Values.secrets.payment_processor.eventbus_password }}@eventbus-service:5672"
type: "Opaque"
