---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "payment-processor-service"
  labels:
    app.kubernetes.io/name: "eshop-apphost"
    app.kubernetes.io/component: "payment-processor"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  type: "ClusterIP"
  selector:
    app.kubernetes.io/name: "eshop-apphost"
    app.kubernetes.io/component: "payment-processor"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  ports:
    - name: "http"
      protocol: "TCP"
      port: {{ .Values.parameters.payment_processor.port_http | int }}
      targetPort: {{ .Values.parameters.payment_processor.port_http | int }}
