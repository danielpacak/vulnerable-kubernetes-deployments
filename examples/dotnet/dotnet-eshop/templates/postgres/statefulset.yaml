---
apiVersion: "apps/v1"
kind: "StatefulSet"
metadata:
  name: "postgres-statefulset"
  labels:
    app.kubernetes.io/name: "eshop-apphost"
    app.kubernetes.io/component: "postgres"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "eshop-apphost"
        app.kubernetes.io/component: "postgres"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - image: "docker.io/ankane/pgvector:latest"
          name: "postgres"
          envFrom:
            - configMapRef:
                name: "postgres-config"
            - secretRef:
                name: "postgres-secrets"
          ports:
            - name: "tcp"
              protocol: "TCP"
              containerPort: 5432
          imagePullPolicy: "IfNotPresent"
  selector:
    matchLabels:
      app.kubernetes.io/name: "eshop-apphost"
      app.kubernetes.io/component: "postgres"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: 1
  persistentVolumeClaimRetentionPolicy: {}
  updateStrategy:
    rollingUpdate:
      maxUnavailable: 1
    type: "RollingUpdate"
