---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "webhooks-api-deployment"
  labels:
    app.kubernetes.io/name: "eshop-apphost"
    app.kubernetes.io/component: "webhooks-api"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "eshop-apphost"
        app.kubernetes.io/component: "webhooks-api"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - image: "{{ .Values.parameters.webhooks_api.webhooks_api_image }}"
          name: "webhooks-api"
          envFrom:
            - configMapRef:
                name: "webhooks-api-config"
            - secretRef:
                name: "webhooks-api-secrets"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: {{ .Values.parameters.webhooks_api.port_http | int }}
          imagePullPolicy: "IfNotPresent"
  selector:
    matchLabels:
      app.kubernetes.io/name: "eshop-apphost"
      app.kubernetes.io/component: "webhooks-api"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
