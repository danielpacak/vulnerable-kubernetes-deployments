---
apiVersion: "v1"
kind: "Secret"
metadata:
  name: "ordering-api-secrets"
  labels:
    app.kubernetes.io/name: "eshop-apphost"
    app.kubernetes.io/component: "ordering-api"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
stringData:
  ConnectionStrings__eventbus: "amqp://guest:{{ .Values.secrets.ordering_api.eventbus_password }}@eventbus-service:5672"
  EVENTBUS_PASSWORD: "{{ .Values.secrets.ordering_api.eventbus_password }}"
  EVENTBUS_URI: "amqp://guest:{{ .Values.secrets.ordering_api.eventbus_password }}@eventbus-service:5672"
  ConnectionStrings__orderingdb: "Host=postgres-service;Port=5432;Username=postgres;Password={{ .Values.secrets.ordering_api.postgres_password }};Database=orderingdb"
  ORDERINGDB_PASSWORD: "{{ .Values.secrets.ordering_api.postgres_password }}"
  ORDERINGDB_URI: "postgresql://postgres:{{ .Values.secrets.ordering_api.postgres_password }}@postgres-service:5432/orderingdb"
type: "Opaque"
