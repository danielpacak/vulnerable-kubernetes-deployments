---
apiVersion: "apps/v1"
kind: "StatefulSet"
metadata:
  name: "redis-statefulset"
  labels:
    app.kubernetes.io/name: "eshop-apphost"
    app.kubernetes.io/component: "redis"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "eshop-apphost"
        app.kubernetes.io/component: "redis"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - command:
            - "/bin/sh"
          image: "docker.io/library/redis:8.6"
          name: "redis"
          envFrom:
            - secretRef:
                name: "redis-secrets"
          args:
            - "-c"
            - "redis-server --requirepass $REDIS_PASSWORD"
          ports:
            - name: "tcp"
              protocol: "TCP"
              containerPort: 6379
          imagePullPolicy: "IfNotPresent"
  selector:
    matchLabels:
      app.kubernetes.io/name: "eshop-apphost"
      app.kubernetes.io/component: "redis"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: 1
  persistentVolumeClaimRetentionPolicy: {}
  updateStrategy:
    rollingUpdate:
      maxUnavailable: 1
    type: "RollingUpdate"
