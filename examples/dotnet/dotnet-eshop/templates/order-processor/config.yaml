---
apiVersion: "v1"
kind: "ConfigMap"
metadata:
  name: "order-processor-config"
  labels:
    app.kubernetes.io/name: "eshop-apphost"
    app.kubernetes.io/component: "order-processor"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
data:
  OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "{{ .Values.config.order_processor.OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY }}"
  ASPNETCORE_FORWARDEDHEADERS_ENABLED: "{{ .Values.config.order_processor.ASPNETCORE_FORWARDEDHEADERS_ENABLED }}"
  HTTP_PORTS: "{{ .Values.parameters.order_processor.port_http }}"
  EVENTBUS_HOST: "{{ .Values.config.order_processor.EVENTBUS_HOST }}"
  EVENTBUS_PORT: "{{ .Values.config.order_processor.EVENTBUS_PORT }}"
  EVENTBUS_USERNAME: "{{ .Values.config.order_processor.EVENTBUS_USERNAME }}"
  ORDERINGDB_HOST: "{{ .Values.config.order_processor.ORDERINGDB_HOST }}"
  ORDERINGDB_PORT: "{{ .Values.config.order_processor.ORDERINGDB_PORT }}"
  ORDERINGDB_USERNAME: "{{ .Values.config.order_processor.ORDERINGDB_USERNAME }}"
  ORDERINGDB_JDBCCONNECTIONSTRING: "{{ .Values.config.order_processor.ORDERINGDB_JDBCCONNECTIONSTRING }}"
  ORDERINGDB_DATABASENAME: "{{ .Values.config.order_processor.ORDERINGDB_DATABASENAME }}"
