---
apiVersion: v1
kind: Namespace
metadata:
  name: dotnet-zero-9
---
apiVersion: v1
kind: Service
metadata:
  name: dotnet-zero-9
  namespace: dotnet-zero-9
  labels:
    app: dotnet-zero-9
spec:
  type: ClusterIP
  selector:
    app: dotnet-zero-9
  ports:
    - port: 8080
      protocol: TCP
      targetPort: 8080
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-zero-9
  namespace: dotnet-zero-9
  labels:
    app: dotnet-zero-9  
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dotnet-zero-9
  template:
    metadata:
      labels:
        app: dotnet-zero-9
    spec:
      containers:
        - name: dotnet-zero-9
          image: docker.io/danielpacak/dotnet-zero:9
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /healtz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healtz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
