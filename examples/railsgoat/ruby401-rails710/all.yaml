---
apiVersion: v1
kind: Namespace
metadata:
  name: railsgoat-ruby401-rails710
---
apiVersion: v1
kind: Service
metadata:
  name: railsgoat-ruby401-rails710
  namespace: railsgoat-ruby401-rails710
spec:
  ports:
    - name: http
      port: 3000
  selector:
    app: railsgoat-ruby401-rails710
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: railsgoat-ruby401-rails710
  namespace: railsgoat-ruby401-rails710
  labels:
    app: railsgoat-ruby401-rails710
spec:
  selector:
    matchLabels:
      app: railsgoat-ruby401-rails710
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: railsgoat-ruby401-rails710
      labels:
        app: railsgoat-ruby401-rails710
    spec:
      containers:
        - name: railsgoat-ruby401-rails710
          image: docker.io/danielpacak/railsgoat:ruby-4.0.1-rails-7.1.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - '-c'
          args:
            - >-
              rails db:setup && rm -f tmp/pids/server.pid && bundle exec rails s -p 3000 -b '0.0.0.0'
          ports:
            - containerPort: 3000
              name: http
